<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الشغل والفلوس | الموسوعة الرقمية الشاملة 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0062ff;
            --dark: #0f172a;
            --accent: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --voda: #e60000;
            --bg: #f8fafc;
        }

        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; color: var(--dark); transition: 0.3s; }
        .dark-mode { --bg: #0f172a; --dark: #f8fafc; background: #0f172a; color: #f8fafc; }
        .dark-mode .section-box { background: #1e293b; border-color: #334155; color: white; }
        .dark-mode .card { background: #334155; border-color: #475569; }

        /* Navbar */
        nav { background: var(--primary); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        nav .logo { font-weight: 900; font-size: 1.5rem; color: white; }
        .nav-btns { display: flex; gap: 15px; }
        .mode-toggle { cursor: pointer; background: white; border: none; padding: 5px 15px; border-radius: 20px; font-weight: bold; }

        header { background: linear-gradient(135deg, #1e293b, #0062ff); color: white; padding: 100px 20px; text-align: center; }
        header h1 { font-size: 3.5rem; margin: 0; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        header p { font-size: 1.3rem; opacity: 0.9; max-width: 700px; margin: 20px auto; }

        .search-area { max-width: 600px; margin: -30px auto 40px; }
        .search-area input { width: 100%; padding: 20px; border-radius: 50px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1); font-size: 1rem; outline: none; }

        .container { max-width: 1200px; margin: auto; padding: 0 20px; }

        .section-box { background: white; border-radius: 25px; padding: 40px; margin-bottom: 50px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .section-title { font-size: 2rem; margin-bottom: 35px; color: var(--primary); border-right: 8px solid var(--accent); padding-right: 15px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(330px, 1fr)); gap: 30px; }
        .card { background: #fff; border: 1px solid #eef2f6; border-radius: 20px; padding: 30px; transition: 0.4s; position: relative; overflow: hidden; }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .card h3 { margin-top: 0; color: var(--primary); font-size: 1.4rem; }
        .card p { font-size: 0.95rem; color: #64748b; line-height: 1.8; margin-bottom: 25px; }

        /* Buttons Array */
        .btn-stack { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; text-align: center; text-decoration: none; border-radius: 12px; font-weight: 700; font-size: 0.9rem; transition: 0.3s; border: none; cursor: pointer; }
        .btn-main { background: var(--primary); color: white; }
        .btn-yt { background: #fff1f1; color: var(--voda); border: 1px solid #ffcccc; }
        .btn-dark { background: var(--dark); color: white; }
        .btn-ai { background: linear-gradient(45deg, #8b5cf6, #3b82f6); color: white; }

        /* Wallet Section Special */
        .wallet-hub { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .wallet-item { padding: 20px; border-radius: 15px; text-align: center; color: white; font-weight: 900; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        /* Review Section */
        .review-strip { background: #f1f5f9; padding: 20px; border-radius: 15px; border-right: 5px solid var(--success); margin-bottom: 15px; }

        /* Chat Widget */
        #chat-bot { position: fixed; bottom: 30px; left: 30px; z-index: 2000; }
        #chat-open { background: var(--primary); width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        #chat-win { display: none; width: 380px; height: 550px; background: white; border-radius: 20px; position: absolute; bottom: 85px; left: 0; box-shadow: 0 20px 50px rgba(0,0,0,0.2); flex-direction: column; overflow: hidden; }
        .chat-h { background: var(--primary); color: white; padding: 20px; font-weight: bold; display: flex; justify-content: space-between; }
        .chat-b { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #f8fafc; }
        .chat-f { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .chat-f input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 10px; outline: none; }

        footer { background: #0f172a; color: white; padding: 60px 20px; text-align: center; }

        @media (max-width: 768px) { header h1 { font-size: 2.2rem; } .grid { grid-template-columns: 1fr; } #chat-win { width: 90vw; } }
    </style>
</head>
<body>

<nav>
    <div class="logo">أكاديمية الشغل 2026</div>
    <div class="nav-btns">
        <button class="mode-toggle" onclick="document.body.classList.toggle('dark-mode')">🌙 الوضع الليلي</button>
    </div>
</nav>

<header>
    <h1>طريقك المباشر للمال والاحتراف 💰</h1>
    <p>الموسوعة العربية الأكبر المخصصة لتعليم الشباب طرق الربح الحقيقية وسحب الأرباح في مصر.</p>
</header>

<div class="search-area">
    <input type="text" id="searchInput" onkeyup="filterContent()" placeholder="ابحث عن مهارة، منصة، أو طريقة سحب...">
</div>

<div class="container">

    <section class="section-box">
        <h2 class="section-title">🏆 أهم منصات العمل الحر (مواقع رسمية)</h2>
        <div class="grid">
            <div class="card">
                <h3>Upwork & Fiverr</h3>
                <p>العمالقة في السوق العالمي. إذا كان لديك مهارة متوسطة ولغة إنجليزية، هذا
