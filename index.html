<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الشغل والفلوس | دليل المبتدئين</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #050f22; color: white; text-align: center; scroll-behavior: smooth; }
        header { background: linear-gradient(135deg, #0a1931, #162a49); padding: 50px 20px; border-bottom: 3px solid #4facfe; }
        nav { background: #0a1931; padding: 15px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        nav a { color: #4facfe; text-decoration: none; font-weight: bold; font-size: 16px; transition: 0.3s; }
        nav a:hover { color: white; }
        .container { padding: 40px 20px; max-width: 800px; margin: auto; }
        .btn-card { background: #0a1931; padding: 25px; margin: 15px auto; border-radius: 15px; width: 90%; cursor: pointer; transition: 0.3s; border: 1px solid #162a49; display: block; color: white; text-decoration: none; font-size: 20px; font-weight: bold; }
        .btn-card:hover { background: #4facfe; color: #050f22; transform: translateY(-5px); box-shadow: 0 0 20px rgba(79, 172, 254, 0.4); }
        .ad-space { background: #162a49; border: 2px dashed #4facfe; padding: 20px; margin: 20px auto; color: #4facfe; font-size: 14px; border-radius: 10px; }
        h2 { color: #4facfe; margin: 30px 0; font-size: 28px; border-bottom: 2px solid #162a49; padding-bottom: 10px; }
        .article-card { background: #162a49; padding: 25px; border-radius: 15px; margin: 20px auto; text-align: right; border-right: 5px solid #4facfe; line-height: 1.8; }
        .article-card h3 { color: #4facfe; margin-top: 0; }
        .qa-section { background: #0a1931; padding: 20px; border-radius: 15px; border: 1px solid #162a49; }
        .qa-btn { background: #162a49; color: white; padding: 15px; margin: 10px 0; border-radius: 10px; width: 100%; text-align: right; border: none; cursor: pointer; font-size: 16px; transition: 0.3s; border-right: 4px solid transparent; }
        .qa-btn:hover { border-right-color: #4facfe; background: #1c355e; }
        .footer-btns { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; padding: 20px; }
        .small-btn { background: #4facfe; color: #050f22; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
